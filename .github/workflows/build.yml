name: Build Windows Installer

on:
  push:
    branches: [main, master]
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build NSIS installer (Windows)
    runs-on: windows-latest
    # 工作目录就是 Tauri 工程根 app/
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable, MSVC target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'app/src-tauri -> target'

      # 注意：不要手动装系统 NSIS。
      # Tauri v2 在打包时会自动下载自带的 makensis 与 nsis_tauri_utils 插件，
      # 系统 NSIS 不仅不需要，且 winget 在 CI 上常返回非 0 导致 job 失败。

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri (release + NSIS bundle)
        run: npm run tauri build

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: md-editor-setup
          # 产物相对 app/ 目录：app/src-tauri/target/release/bundle/nsis/MD Editor_1.0.0_x64-setup.exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
